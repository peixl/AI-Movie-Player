name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-packages:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows package
            artifact_name: windows-package
          - os: macos-latest
            label: macOS package
            artifact_name: macos-package
          - os: ubuntu-latest
            label: Linux package
            artifact_name: linux-package

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libasound2-dev

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version "${{ github.ref_name || 'dev' }}"

      - name: Package macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/package-macos.sh "${GITHUB_REF_NAME:-dev}"

      - name: Package Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/package-linux.sh "${GITHUB_REF_NAME:-dev}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-packages
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows-package/*.zip
            release-assets/windows-package/*.sha256
            release-assets/macos-package/*.tar.gz
            release-assets/macos-package/*.sha256
            release-assets/linux-package/*.tar.gz
            release-assets/linux-package/*.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
