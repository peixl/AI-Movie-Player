name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-packages:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows package
            artifact_name: windows-package
          - os: macos-latest
            label: macOS package
            artifact_name: macos-package

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'dev' }
          $packageRoot = "dist/AI-Movie-Player-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item "target/release/ai-movie-player.exe" "$packageRoot/AI-Movie-Player.exe"
          Copy-Item "README.md", "readme-cn.md", "LICENSE" $packageRoot
          Compress-Archive -Path "$packageRoot/*" -DestinationPath "dist/AI-Movie-Player-$version-windows-x64.zip" -Force

      - name: Package macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          package_root="dist/AI-Movie-Player-${version}-macOS-${RUNNER_ARCH}"
          app_root="$package_root/AI-Movie-Player.app"
          mkdir -p "$app_root/Contents/MacOS" "$app_root/Contents/Resources"
          cp target/release/ai-movie-player "$app_root/Contents/MacOS/AI-Movie-Player"
          chmod +x "$app_root/Contents/MacOS/AI-Movie-Player"
          cat > "$app_root/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleDisplayName</key>
              <string>AI-Movie-Player</string>
              <key>CFBundleExecutable</key>
              <string>AI-Movie-Player</string>
              <key>CFBundleIdentifier</key>
              <string>ai.ifq.AIMoviePlayer</string>
              <key>CFBundleName</key>
              <string>AI-Movie-Player</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${version}</string>
              <key>CFBundleVersion</key>
              <string>${version}</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
            </dict>
          </plist>
          EOF
          cp README.md readme-cn.md LICENSE "$package_root/"
          tar -czf "dist/AI-Movie-Player-${version}-macOS-${RUNNER_ARCH}.tar.gz" -C dist "$(basename "$package_root")"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-packages
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows-package/*.zip
            release-assets/macos-package/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}