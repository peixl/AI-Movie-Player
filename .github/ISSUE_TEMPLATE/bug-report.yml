name: Bug Report
description: Report a reproducible bug in AI-Movie-Player / 提交可复现缺陷
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep it concrete and reproducible.
        感谢反馈缺陷，请尽量提供可复现、可定位的信息。

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: What build or commit are you using? / 你当前使用的是哪个版本或提交？
      placeholder: v0.2.1 or main@commit
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      description: Where does the issue happen? / 问题出现在哪个平台？
      options:
        - Windows
        - macOS
        - Linux
        - Multiple platforms / 多个平台
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary / 问题概述
      description: What is going wrong? / 具体哪里出错了？
      placeholder: Describe the observed problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Provide the shortest reliable repro. / 请提供最短可复现路径。
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result / 期望结果
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result / 实际结果
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: ai-provider
    attributes:
      label: AI Provider and Model / AI 提供方与模型
      description: If relevant, include provider, model, and endpoint type. / 如与 AI 有关，请写明提供方、模型和接口类型。
      placeholder: OpenAI / gpt-4o-mini or Ollama / llama3

  - type: textarea
    id: logs
    attributes:
      label: Logs, Screenshots, or Notes / 日志、截图或补充说明
      description: Paste useful output or attach screenshots. / 请附上有帮助的输出、日志或截图。
      render: shell
